<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Effective Teacher">
<meta name="theme-color" content="#FAFAF9">
<title>Effective Teacher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
/* ── Reset + Root ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAFAF9;
  --surface:#FFFFFF;
  --border:#EBEBEA;
  --text:#1A1A1A;
  --muted:#888884;
  --accent:#2563EB;
  --accent-bg:#EFF6FF;
  --nav-h:68px;
  --radius:14px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
/* ── Layout ────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
#views{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 8px);scroll-behavior:smooth}
.view{display:none;padding:20px 16px 8px}
.view.active{display:block}
/* ── Bottom Nav ────────────────────────────────────────── */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:var(--nav-h);
  background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px)
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);border:none;background:none;font-size:10px;font-weight:600;font-family:var(--font);letter-spacing:.03em;transition:color .15s;padding-top:8px}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:transform .15s}
.nav-btn.active svg{transform:scale(1.08)}
/* ── Cards ─────────────────────────────────────────────── */
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-tap{cursor:pointer;transition:transform .1s,box-shadow .1s}
.card-tap:active{transform:scale(.985);box-shadow:none}
/* ── Typography ─────────────────────────────────────────── */
.page-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:20px}
.section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
/* ── Buttons ────────────────────────────────────────────── */
.btn{width:100%;padding:14px;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .1s,transform .1s;font-family:var(--font);letter-spacing:-.01em}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--border);color:var(--text)}
.btn-danger{background:#DC2626;color:#fff}
.btn-link{background:none;border:none;color:var(--accent);font-weight:700;font-family:var(--font);font-size:14px;cursor:pointer;padding:0}
/* ── Form ───────────────────────────────────────────────── */
.field{margin-bottom:18px}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.05em;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:72px;resize:vertical;line-height:1.5}
/* ── Radio options ──────────────────────────────────────── */
.radio-group{display:flex;flex-direction:column;gap:7px}
.radio-opt{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s,background .15s}
.radio-opt.selected{border-color:var(--accent);background:var(--accent-bg)}
.rdot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.radio-opt.selected .rdot{border-color:var(--accent);background:var(--accent)}
.radio-opt.selected .rdot::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;display:block}
.radio-opt span{font-size:14px;line-height:1.4}
/* ── Range ──────────────────────────────────────────────── */
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:var(--border);outline:none;padding:0;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(37,99,235,.3)}
.range-hints{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px}
.range-val{text-align:center;font-size:28px;font-weight:800;color:var(--accent);margin-top:4px;letter-spacing:-.03em}
/* ── Stepper ─────────────────────────────────────────────── */
.stepper{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1.5px solid var(--border);border-radius:13px;padding:5px;margin-top:4px}
.step-btn{width:48px;height:48px;border:none;border-radius:10px;background:var(--surface);font-size:26px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:var(--font);box-shadow:0 1px 3px rgba(0,0,0,.08);transition:background .1s;line-height:1;padding-bottom:2px}
.step-btn:active{background:var(--border)}
.step-display{font-size:32px;font-weight:800;color:var(--accent);letter-spacing:-.03em;min-width:48px;text-align:center}
/* ── Progress bar ───────────────────────────────────────── */
.pbar-wrap{background:#F0F0EE;border-radius:99px;height:5px;overflow:hidden;margin-top:8px}
.pbar{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.16,1,.3,1)}
/* ── Tabs ───────────────────────────────────────────────── */
.tabs{display:flex;background:var(--bg);border-radius:11px;padding:3px;margin-bottom:18px;border:1px solid var(--border)}
.tab{flex:1;padding:8px 6px;text-align:center;font-size:13px;font-weight:700;border-radius:9px;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:none;font-family:var(--font);letter-spacing:-.01em}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
/* ── Log entries ────────────────────────────────────────── */
.log-entry{padding:13px;border-radius:11px;margin-bottom:8px;border:1px solid var(--border);background:var(--surface)}
.log-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.log-date{font-size:12px;color:var(--muted);font-weight:500}
/* ── Empty states ───────────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px;line-height:1}
.empty p{font-size:15px;line-height:1.6}
/* ── Block badge / number ───────────────────────────────── */
.block-num{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;flex-shrink:0}
.block-num-lg{width:48px;height:48px;border-radius:13px;font-size:20px}
/* ── Week 0 area row ────────────────────────────────────── */
.area-row{background:var(--surface);border-radius:var(--radius);padding:15px;margin-bottom:10px;box-shadow:var(--shadow)}
.area-name{font-size:14px;font-weight:600;margin-bottom:12px}
/* ── Info boxes ─────────────────────────────────────────── */
.info-card{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:12px}
.info-card h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.info-card p{font-size:14px;line-height:1.65;color:#333}
.accent-strip{border-left:3px solid var(--accent);padding-left:12px;margin-bottom:12px}
.accent-strip p{font-size:14px;line-height:1.65;color:#333}
/* ── Profile ────────────────────────────────────────────── */
.profile-item{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s}
.profile-item.active-p{border-color:var(--accent);background:var(--accent-bg)}
/* ── Chart ──────────────────────────────────────────────── */
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.chart-label{font-size:12px;flex:1;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-right{display:flex;align-items:center;gap:7px;width:120px;flex-shrink:0}
.chart-bar-bg{flex:1;background:#F0F0EE;border-radius:99px;height:8px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.16,1,.3,1)}
.chart-val{font-size:12px;font-weight:700;width:24px;text-align:right}
/* ── Back btn ───────────────────────────────────────────── */
.back-btn{display:flex;align-items:center;gap:5px;color:var(--accent);font-weight:700;font-size:14px;cursor:pointer;border:none;background:none;font-family:var(--font);padding:0;margin-bottom:18px}
/* ── Score chip ─────────────────────────────────────────── */
.score-chip{font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px}
/* ── Info card swiper ────────────────────────────────────── */
.swiper-wrap{position:relative;overflow:hidden;border-radius:var(--radius);margin-bottom:14px;touch-action:pan-y}
.swiper-track{display:flex;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.swiper-card{min-width:100%;padding:20px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-sizing:border-box}
.swiper-headline{font-size:17px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px;line-height:1.25}
.swiper-body{font-size:14px;line-height:1.7;color:#444}
.swiper-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.swiper-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s;cursor:pointer}
.swiper-dot.active{width:18px;border-radius:3px}
.swiper-nav{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.swiper-nav button{border:none;background:none;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;color:var(--accent);padding:0}
.swiper-nav button:disabled{color:var(--muted);cursor:default}
.swiper-count{font-size:12px;color:var(--muted);font-weight:600}
#offline-banner{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1A1A1A;color:#fff;text-align:center;font-size:13px;font-weight:600;font-family:var(--font);padding:8px 16px;z-index:300;letter-spacing:.01em}
#offline-banner.show{display:block}
body.offline #views{padding-top:36px}
#toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;font-family:var(--font);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="offline-banner">No internet connection: running from cache</div>
<div id="app">
    <div id="views">
    <div class="view active" id="view-home"><div id="home-content"></div></div>
    <div class="view" id="view-blocks"><div id="blocks-content"></div></div>
    <div class="view" id="view-block-detail"><div id="block-detail-content"></div></div>
    <div class="view" id="view-progress"><div id="progress-content"></div></div>
    <div class="view" id="view-profiles"><div id="profiles-content"></div></div>
    <div class="view" id="view-week0"><div id="week0-content"></div></div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" data-view="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
    </button>
    <button class="nav-btn" data-view="blocks">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Blocks
    </button>
    <button class="nav-btn" data-view="progress">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progress
    </button>
    <button class="nav-btn" data-view="profiles">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Profiles
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════════
// Safe write: returns true on success, false if storage rejected the write
// (quota exceeded, private-mode restrictions, etc). Never throws to the caller.
function safeSet(key, value){
  try {
    localStorage.setItem(key, value);
    return true;
  } catch(e){
    return false;
  }
}

const DB = {
  getProfiles(){ return JSON.parse(localStorage.getItem('et_profiles') || '[]') },
  saveProfiles(p){ return safeSet('et_profiles', JSON.stringify(p)) },
  getActive(){ return localStorage.getItem('et_active') || null },
  setActive(id){ return safeSet('et_active', id) },
  getWeek0(pid){ return JSON.parse(localStorage.getItem('et_'+pid+'_w0') || 'null') },
  saveWeek0(pid,d){ return safeSet('et_'+pid+'_w0', JSON.stringify(d)) },
  getLogs(pid,b){ return JSON.parse(localStorage.getItem('et_'+pid+'_b'+b) || '[]') },
  addLog(pid,b,entry){
    const logs = this.getLogs(pid,b);
    logs.push({...entry, id: Date.now(), date: new Date().toISOString()});
    return safeSet('et_'+pid+'_b'+b, JSON.stringify(logs));
  },
  deleteLog(pid,b,id){
    const logs = this.getLogs(pid,b).filter(l => l.id !== id);
    return safeSet('et_'+pid+'_b'+b, JSON.stringify(logs));
  }
};

// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const W0_AREAS = [
  "Natural pause points every 5-10 min",
  "Uses analogies or concrete examples",
  "Calls on non-volunteers",
  "Avoids reading text off slides",
  "Moves away from the front of the room"
];

const BLOCKS = [
  {
    id: 1, title: "Pacing", technique: "The Five-Minute Rule", weeks: "Weeks 1-2",
    color: "#3B82F6", light: "#EFF6FF",
    cards: [
      { headline: "The problem", body: "Teachers know they should pause. They don't, because the flow of the lesson and anxiety about coverage make stopping feel like a cost. Good intentions disappear under pressure." },
      { headline: "The fix: make it external", body: "Set a timer before you walk in. When it goes off, you stop, no matter where you are. The decision is already made. You don't have to choose in the moment." },
      { headline: "Why pausing works", body: "Working memory saturates quickly. A pause gives the brain time to consolidate what just came in before you add more. Without it, new information overwrites the old." },
      { headline: "The pause needs a task", body: "Don't just stop: activate. Give students something short to do: write, connect, predict, or explain to a neighbour. The task does the consolidation work." },
      { headline: "Vary the activity", body: "Retrieval, connection, prediction, pair share, sketch: rotate through these across lessons. The same task every time becomes invisible and stops working." },
      { headline: "The target", body: "Stop at least once per lesson when the timer goes off. Wait for actual responses before continuing. It will feel slow at first. That feeling is normal and temporary." }
    ],
    summary: "Set a timer for 5-10 minutes before you start teaching. When it goes off, you stop, no matter where you are, and activate students with a short task (see activities below). Then reset and go again.",
    why: "Pacing is structural. Getting regular pause points into your lessons creates the space every other technique needs. The problem is not that teachers don't know they should pause; it's that the flow of the lesson and anxiety about coverage make stopping feel like a cost. The timer removes that decision from the moment. When it goes off, stopping is no longer a choice you have to make mid-explanation; it was already made before you walked in. Without the external cue, 'pause every five minutes' stays an intention, and intentions disappear under pressure.\n\nThe pause itself needs to do something: not just break the flow but give the brain a task that consolidates what just came in. Vary the activity across lessons so the pause doesn't become invisible through repetition:\n\n• Retrieval — 'Write down two things from the last five minutes.' Simple, always works.\n• Connection — 'How does this connect to what we covered last week?' Builds schema rather than just consolidating new information.\n• Question generation — 'Write one question you still have.' Surfaces misconceptions before they bed in. Powerful before a discussion.\n• Prediction — 'What do you think comes next?' Works well mid-topic. Activates prior knowledge and creates a hook for the next segment.\n• Pair share — 'Turn to the person next to you and explain the main idea in one sentence.' Retrieval plus articulation. Circulate and listen.\n• Sketch or diagram — 'Draw a quick sketch of the process we just described.' Works well for anything spatial or sequential. Different cognitive channel from writing.",
    target: "Score 5 or above out of 6 by end of Week 2.",
    scoreMax: 6,
    fields: [
      { key:"q1", label:"Did the timer go off at least once?",
        opts:["Never set it","Set it, forgot to stop","Stopped when it went off"] },
      { key:"q2", label:"Did students do the active task?",
        opts:["Skipped it","Told them but moved on fast","Waited for actual responses"] },
      { key:"q3", label:"Did I restart teaching after the break?",
        opts:["No, ran out of time","Yes, but felt rushed","Yes, felt natural"] }
    ]
  },
  {
    id: 2, title: "Explanation", technique: "Definitions and Analogies", weeks: "Weeks 3-4",
    color: "#16A34A", light: "#F0FDF4",
    cards: [
      { headline: "The core problem", body: "Without a precise anchor up front, students build their own version of a concept, often wrong. Everything taught afterwards attaches to that instead. You can't see it happening." },
      { headline: "The Curse of Knowledge", body: "Once you know something well, it is very hard to remember what it felt like not to know it. This makes it easy to skip the explanation that students actually need." },
      { headline: "Bullet-Proof Definition", body: "One sentence. No qualifications, no ‘basically’ or ‘sort of’. Display it, students read it silently, then say it to a neighbour. Saying it aloud is retrieval, not passive reading." },
      { headline: "What a good definition looks like", body: "✓ 'Propaganda is information deliberately constructed to shape public opinion in favour of a particular ideology, often by distorting or omitting facts.' ✗ 'Propaganda is basically when governments use information to make people think a certain way.' Four escape hatches. The first has none." },
      { headline: "Generative Analogy", body: "An analogy doesn't define; it connects. It borrows a structure the student already understands and maps the new concept onto it, so memory has somewhere to attach the idea immediately." },
      { headline: "What a good analogy looks like", body: "Teaching variables in programming: 'Think of a variable as a named box. You put one thing in it, look at what's inside, or swap it for something else. It can only hold one thing at a time.' A student who has never coded can hold that immediately." }
    ],
    summary: "Start each new concept with either a Bullet-Proof Definition (one precise sentence, read and recited aloud) or a Generative Analogy: a comparison to something students already know that carries the same structure as the new idea.",
    why: "Without a precise anchor up front, students construct their own informal version of a concept, often wrong, and <em>everything taught afterwards attaches to that instead</em>. The <strong>Curse of Knowledge</strong> makes it easy to forget what it feels like to encounter an idea for the first time. These two techniques solve the problem in different ways.\n\n<strong>Bullet-Proof Definition</strong><br>One sentence. No qualifications, no <em>\"sort of\"</em> or <em>\"basically\"</em>. Display it, students read it silently, then say it to a neighbour. Saying it aloud is an act of retrieval, not passive reading.\n\n> <strong>Example: teaching propaganda</strong>\n> ✓ <em>\"Propaganda is information deliberately constructed to shape public opinion in favour of a particular ideology or cause, often by distorting or omitting facts.\"</em>\n> <span style=\"color:#DC2626;font-weight:600\">✗ Not this:</span> <em>\"Propaganda is basically when governments use information to make people think a certain way.\"</em>\n> The second version has four escape hatches: <em>basically</em>, <em>governments</em> (only them?), <em>information</em> (what kind?), <em>a certain way</em> (which way?). The first has none.\n\n<strong>Generative Analogy</strong><br>An analogy does not define; it <em>connects</em>. It borrows a structure the student already understands and maps the new concept onto it, giving memory somewhere to anchor the idea immediately.\n\n> <strong>Example: teaching variables in programming</strong>\n> ✓ <em>\"Think of a variable as a named box. You can put one thing in it, look at what\'s inside, swap it for something else, or read the label to find it. The box doesn\'t care what you put in, but it can only hold one thing at a time.\"</em>\n> <span style=\"color:#DC2626;font-weight:600\">✗ Not this:</span> <em>\"A variable is a named storage location in memory.\"</em>\n> Technically correct, but a student who has never coded has nothing to hang it on.",
    target: "Aim for a total score of 4 or above out of 6 by end of Week 4. A score of 2 on each criterion is solid; 3 on all three is excellent.",
    scoreMax: 6,
    fields: [
      { key:"technique", label:"Which technique did you use?", type:"select",
        opts:["Bullet-Proof Definition","Generative Analogy"] },
      { key:"c1", label:"Was it prepared in advance?",
        opts:["Made it up on the spot (0)","Rough idea beforehand (1)","Written into lesson plan (2)"] },
      { key:"c2", label:"Was it single and clear?",
        opts:["Several mixed explanations (0)","One explanation but wordy (1)","One sentence, no waffle (2)"] },
      { key:"c3", label:"Student response",
        opts:["Blank looks or confusion (0)","Some nodding (1)","Visible 'aha' or correct use shortly after (2)"] }
    ]
  },

function uid(){ return Math.random().toString(36).slice(2,9) }
function fmtDate(iso){
  return new Date(iso).toLocaleDateString('en-GB',{month:'short',day:'numeric'});
}

// Renders why text — handles paragraphs, • bullets, and > callout/example blocks
function formatWhy(text){
  return text.split('\n\n').map(para => {
    const lines = para.split('\n');

    // All lines are > example lines — render as a callout box
    if(lines.length && lines.every(l => l.startsWith('>'))){
      return `<div style="background:var(--bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 13px;margin:10px 0;font-size:13px;line-height:1.7;color:#333">`
        + lines.map(l=>`<div style="margin-bottom:2px">${l.slice(1).trim()}</div>`).join('')
        + '</div>';
    }

    // Has • bullet lines
    if(lines.some(l => l.startsWith('•'))){
      return '<div style="margin-top:4px">'
        + lines.map(l => {
            if(l.startsWith('•')){
              const body = l.slice(1).trim();
              const dash = body.indexOf(' — ');
              if(dash > -1){
                return `<div style="display:flex;gap:8px;margin-bottom:7px;font-size:14px;line-height:1.55">
                  <span style="color:var(--accent);flex-shrink:0;margin-top:1px">•</span>
                  <span><strong>${body.slice(0,dash)}</strong> — ${body.slice(dash+3)}</span></div>`;
              }
              return `<div style="display:flex;gap:8px;margin-bottom:7px;font-size:14px;line-height:1.55">
                <span style="color:var(--accent);flex-shrink:0;margin-top:1px">•</span>
                <span>${body}</span></div>`;
            }
            return l ? `<p style="font-size:14px;line-height:1.65;margin-bottom:4px;color:#333">${l}</p>` : '';
          }).join('')
        + '</div>';
    }

    // Regular paragraph — inline HTML (strong, em, br) passes through
    return `<p style="font-size:14px;line-height:1.7;color:#333;margin-bottom:6px">${para}</p>`;
  }).join('');
}

function getPrompt(blockId, logCount, formVals){
  const bank  = PROMPTS[blockId];
  const index = logCount % 3;
  // Determine low/high based on block
  let isHigh = false;
  if(blockId === 1){
    const total = (formVals.q1||0)+(formVals.q2||0)+(formVals.q3||0);
    const filled = formVals.q1!==undefined && formVals.q2!==undefined && formVals.q3!==undefined;
    isHigh = filled && total >= 4;
  } else if(blockId === 2){
    const extract = v => { if(!v) return 0; const n=v.toString().match(/\((\d+)\)/); return n?parseInt(n[1]):0; };
    const total = extract(formVals.c1)+extract(formVals.c2)+extract(formVals.c3);
    const filled = formVals.c1!==undefined && formVals.c2!==undefined && formVals.c3!==undefined;
    isHigh = filled && total >= 6;
  } else if(blockId === 3){
    isHigh = (formVals.count||0) >= 3;
  } else if(blockId === 4){
    isHigh = formVals.readSlide === 'No';
  } else if(blockId === 5){
    const total = calcScore(BLOCKS.find(b=>b.id===5), formVals);
    isHigh = total >= 10;
  }
  return (isHigh ? bank.high : bank.low)[index];
}

function buildSwiper(cards, color){
  const id = 'sw' + Date.now();
  const html = `
    <div class="swiper-wrap" id="${id}-wrap">
      <div class="swiper-track" id="${id}-track">
        ${cards.map((c,i)=>`
          <div class="swiper-card">
            <div class="swiper-headline" style="color:${color}">${c.headline}</div>
            <div class="swiper-body">${c.body}</div>
          </div>`).join('')}
      </div>
      <div class="swiper-nav">
        <button id="${id}-prev" onclick="swiperMove('${id}',-1)" disabled>&#8592; Prev</button>
        <div class="swiper-dots" id="${id}-dots">
          ${cards.map((_,i)=>`<div class="swiper-dot${i===0?' active':''}" style="${i===0?'background:'+color:''}" onclick="swiperGo('${id}',${i},${cards.length},'${color}')"></div>`).join('')}
        </div>
        <button id="${id}-next" onclick="swiperMove('${id}',1)">Next &#8594;</button>
      </div>
    </div>`;

  // Wire up touch after render
  setTimeout(()=>{
    const wrap = document.getElementById(id+'-wrap');
    if(!wrap) return;
    let startX=0, startY=0, dragging=false;
    wrap.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; dragging=true; },{passive:true});
    wrap.addEventListener('touchend', e=>{
      if(!dragging) return; dragging=false;
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40){
        swiperMove(id, dx < 0 ? 1 : -1);
      }
    },{passive:true});
  },0);

  return html;
}

window.swiperMove = function(id, dir){
  const track = document.getElementById(id+'-track');
  if(!track) return;
  const total = track.children.length;
  const cur   = parseInt(track.dataset.cur||'0');
  swiperGo(id, Math.max(0,Math.min(total-1, cur+dir)), total, track.dataset.color);
};

window.swiperGo = function(id, idx, total, color){
  const track = document.getElementById(id+'-track');
  const dots  = document.getElementById(id+'-dots');
  const prev  = document.getElementById(id+'-prev');
  const next  = document.getElementById(id+'-next');
  if(!track) return;
  track.dataset.cur   = idx;
  track.dataset.color = color;
  track.style.transform = `translateX(-${idx*100}%)`;
  dots && dots.querySelectorAll('.swiper-dot').forEach((d,i)=>{
    d.classList.toggle('active', i===idx);
    d.style.background = i===idx ? color : '';
  });
  if(prev) prev.disabled = idx===0;
  if(next) next.disabled = idx===total-1;
};

function calcScore(b, vals){
  if(b.id===1) return (vals.q1||0)+(vals.q2||0)+(vals.q3||0);
  if(b.id===2){
    const extract = v => {
      if(v===undefined||v===null) return 0;
      const n = v.toString().match(/\((\d+)\)/);
      return n ? parseInt(n[1]) : 0;
    };
    return extract(vals.c1)+extract(vals.c2)+extract(vals.c3);
  }
  if(b.id===5) return (parseInt(vals.mobility)||0)+(vals.pace||0)+(vals.volume||0)+(vals.pause||0)+(parseInt(vals.eye)||0);
  return null;
}
function scorePct(b, score){ return b.scoreMax ? Math.round((score/b.scoreMax)*100) : null }

window.stepVal = function(key, min, max, delta){

  const next = Math.min(max, Math.max(min, cur + delta));
  el.textContent = next;

  if(key === 'mobility') S.form._mobilityTouched = true;

  refreshPrompt();

  if(msg) msg.style.display='none';
};

window.stepW0 = function(i, min, max, delta){
  const el  = document.getElementById('w0v-'+i);
  const cur = parseInt(el.textContent) || min;
  const next = Math.min(max, Math.max(min, cur + delta));

};

function getTrend(scores){
  if(scores.length < 2) return null;
  const last = scores[scores.length-1];
  const prev = scores[scores.length-2];
  if(last > prev) return 'up';
  if(last < prev) return 'down';
  return 'flat';
}

// W0 area index maps directly to block id (area 0 = block 1, etc.)
function getRecommended(pid){
  const w0 = DB.getWeek0(pid);
  if(!w0) return [];
  return [0,1,2,3,4]
    .map(i => ({ blockId: i+1, score: w0.scores[i]||0 }))
    .filter(x => x.score < 6)          // only recommend areas not already strong
    .sort((a,b) => a.score - b.score)
    .slice(0,2)
    .map(x => x.blockId);

// A block unlocks if:

//   - the previous block has 3+ lessons logged, or
//   - the Week 0 score for the previous block's area was already 6+

function isUnlocked(blockId, pid){
  if(!pid || blockId === 1) return true;
  if(DB.getLogs(pid, blockId - 1).length >= 3) return true;
  const w0 = DB.getWeek0(pid);

}

  if(!pid) return { complete: false, b5logs: 0, allBlocksDone: false };
  const w0       = DB.getWeek0(pid);
  const b5logs   = DB.getLogs(pid, 5).length;
  const blocksDone = BLOCKS.every(b => {
    const needed = b.id === 5 ? 5 : 3;
    return DB.getLogs(pid, b.id).length >= needed;
  });
  const complete = !!(w0 && blocksDone);
  return { complete, b5logs, allBlocksDone: blocksDone, hasW0: !!w0 };
}
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}
function scrollTop(){ document.getElementById('views').scrollTo({top:0,behavior:'smooth'}) }

// ═══════════════════════════════════════════════
function go(view, opts={}){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===view);
  });
  S.view = view;
  if(opts.block !== undefined){ S.block = opts.block; S.blockTab = 'info'; }
  scrollTop();
  render(view);
}

function render(view){
  if(view==='home') renderHome();
  else if(view==='blocks') renderBlocks();
  else if(view==='block-detail') renderBlockDetail();
  else if(view==='progress') renderProgress();
  else if(view==='profiles') renderProfiles();
  else if(view==='week0') renderWeek0();
}

      el.innerHTML=`<div class="empty"><div class="empty-icon">📝</div><p>No lessons logged yet.<br>Tap "Log lesson" to add your first entry.</p></div>`;
      return;
    }
    el.innerHTML = [...logs].reverse().map(l=>{
      const score = calcScore(b,l);
      return `<div class="log-entry">
        <div class="log-meta">
          <div style="display:flex;flex-direction:column;gap:1px">
            <span class="log-date">${fmtDate(l.date)}</span>

          </div>

}

function buildField(f,b){
  if(f.type==='range'){
    const def = Math.round((f.min+f.max)/2);
    return `<div class="field">
      <label class="field-label">${f.label}</label>
      <div class="stepper">
        <button class="step-btn" onclick="stepVal('${f.key}',${f.min},${f.max},-1)">&#8722;</button>
        <div class="step-display" id="sv-${f.key}">${def}</div>
        <button class="step-btn" onclick="stepVal('${f.key}',${f.min},${f.max},1)">&#43;</button>
      </div>
      <div class="range-hints" style="margin-top:8px"><span>${f.hints[0]}</span><span>${f.hints[1]}</span></div>
    </div>`;
  }
  if(f.type==='select'){
    return `<div class="field">
      <label class="field-label">${f.label}</label>
      <select id="f-${f.key}" onchange="S.form['${f.key}']=this.value;refreshPrompt()">
        ${f.opts.map(o=>`<option value="${o}">${o}</option>`).join('')}
      </select>
    </div>`;
  }
  if(f.type==='number'){
    return `<div class="field">
      <label class="field-label">${f.label}</label>
      <input type="number" id="f-${f.key}" min="0" max="30" placeholder="${f.placeholder||''}" oninput="S.form['${f.key}']=parseInt(this.value)||0;refreshPrompt()">
    </div>`;
  }
  if(f.type==='text'){
    return `<div class="field">
      <label class="field-label">${f.label}</label>
      <input type="text" id="f-${f.key}" placeholder="${f.placeholder||''}" oninput="S.form['${f.key}']=this.value">
    </div>`;
  }
  // radio (default)
  return `<div class="field">
    <label class="field-label">${f.label}</label>
    <div class="radio-group" id="rg-${f.key}">
      ${f.opts.map((o,i)=>`
        <div class="radio-opt" onclick="pickRadio('${f.key}',${i},this.closest('.radio-group'))">
          <div class="rdot"></div><span>${o}</span>
        </div>`).join('')}
    </div>
  </div>`;
}
window.pickRadio = function(key,val,group){
  S.form[key]=val;
  group.querySelectorAll('.radio-opt').forEach((o,i)=>o.classList.toggle('selected',i===val));
  refreshPrompt();
  const msg = document.getElementById('log-validation-msg');
  if(msg) msg.style.display='none';
};

function logSummary(b,l){
  let lines = [];
  if(b.id===3){
    lines.push(`${l.count||0} cold calls &middot; Wait time: ${l.wait||'?'} &middot; Pre-planned: ${l.planned||'?'}`);
  } else if(b.id===4){
    lines.push(`Read from slide: ${l.readSlide||'?'} &middot; Visuals clearer: ${l.visualsClear||'?'}`);
    if(l.slideToFix) lines.push(`Fix: ${l.slideToFix}`);
  } else if(b.id===5){
    lines.push(`Mobility: ${l.mobility||0}/5 · Eye contact: ${l.eye||0}/5`);
    const paceLabels=['','Changed once or twice','Slowed at key moments'];
    const volLabels=['','Raised only','Dropped for emphasis'];
    const pauseLabels=['','Paused once','Used more than once'];
    if(l.pace||l.volume||l.pause) lines.push(`Pace: ${paceLabels[l.pace]||'—'} · Volume: ${volLabels[l.volume]||'—'} · Pause: ${pauseLabels[l.pause]||'—'}`);
  } else if(b.id===2 && l.technique){
    lines.push(`Technique: ${l.technique}`);
  }
  return lines.map(ln=>`<div style="font-size:13px;color:#444;line-height:1.5">${ln}</div>`).join('');
}

window.saveLog = function(blockId){
  const pid = DB.getActive(); if(!pid) return;
  const b = BLOCKS.find(x=>x.id===blockId);

  // Collect select/number/text values from DOM first
  b.fields.forEach(f=>{
    if(['select','number','text'].includes(f.type)){
      const inp = document.getElementById('f-'+f.key);
      if(inp && S.form[f.key]===undefined){
        S.form[f.key] = f.type==='number' ? (parseInt(inp.value)||0) : inp.value;
      }
    }
  });

  // Validation: check meaningful engagement per block
  const err = validateLog(b, S.form);
  if(err){
    const msgEl = document.getElementById('log-validation-msg');
    if(msgEl){ msgEl.textContent = err; msgEl.style.display = 'block'; }
    return;
  }

  // Soft nudge: save but remind if no note written
  const hasNote = (S.form.notes||'').trim().length > 0;

  const ok = DB.addLog(pid,blockId,(()=>{ const {_mobilityTouched,_eyeTouched,...clean}=S.form; return clean; })());
  if(!ok){
    const msgEl = document.getElementById('log-validation-msg');
    if(msgEl){
      msgEl.textContent = 'Could not save: your device storage may be full or restricted. Try exporting a backup and clearing space.';
      msgEl.style.display = 'block';
    } else {
      alert('Could not save: your device storage may be full or restricted.');
    }
    return;
  }
  toast(hasNote ? 'Lesson logged' : 'Logged. Add a reflection note next time');
  S.blockTab='history';
  renderBlockDetail();
};

function validateLog(b, vals){
  if(b.id === 1){
    if(vals.q1 === undefined && vals.q2 === undefined && vals.q3 === undefined)
      return 'Pick at least one answer before saving.';
  }
  if(b.id === 2){
    const extract = v => { if(!v) return 0; const n=v.toString().match(/\((\d+)\)/); return n?parseInt(n[1]):0; };
    if(vals.c1 === undefined && vals.c2 === undefined && vals.c3 === undefined)
      return 'Pick at least one answer before saving.';
  }
  if(b.id === 3){
    const count = parseInt(vals.count) || 0;
    const hasRadio = vals.wait !== undefined || vals.planned !== undefined;
    if(count === 0 && !hasRadio)
      return 'Enter your cold call count or answer at least one question.';
  }
  if(b.id === 4){
    if(vals.readSlide === undefined && vals.visualsClear === undefined && !vals.slideToFix)
      return 'Fill in at least one field before saving.';
  }
  if(b.id === 5){
    // Sliders always carry a real value once the form is open, so a genuine 3/3
    // is valid input. Only block a completely untouched form: require either a
    // radio answered, or a slider the user actually interacted with.
    const hasRadio = vals.pace !== undefined || vals.volume !== undefined || vals.pause !== undefined;
    const sliderTouched = vals._mobilityTouched === true || vals._eyeTouched === true;
    if(!hasRadio && !sliderTouched)
      return 'Answer at least one of the pace, volume or pause questions before saving.';
  }
  return null;
}

window.delLog = function(blockId,logId){
  const pid = DB.getActive(); if(!pid) return;
  if(!confirm('Delete this entry?')) return;
  DB.deleteLog(pid,blockId,logId);
  renderTab();
};

function lineChart(scores,b){
  if(scores.length < 2) return `<div style="font-size:14px;color:var(--muted)">Log at least 2 lessons to see the trend.</div>`;
  const W=300,H=80,PAD=20;
  const pts = scores.map((s,i)=>[
    PAD+(i/(scores.length-1))*(W-PAD*2),
    H-PAD-(s/b.scoreMax)*(H-PAD*2)
  ]);
  const poly = pts.map(p=>p.join(',')).join(' ');
  const dots = pts.map(([x,y],i)=>
    `<circle cx="${x}" cy="${y}" r="4.5" fill="${b.color}" stroke="#fff" stroke-width="1.5"><title>Lesson ${i+1}: ${scores[i]}/${b.scoreMax}</title></circle>`
  ).join('');
  const target = b.scoreMax ? H-PAD-(5/b.scoreMax)*(H-PAD*2) : null; // rough target line
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">
    <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="var(--border)" stroke-width="1"/>
    <polyline points="${poly}" fill="none" stroke="${b.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${PAD}" y="${H}" font-size="10" fill="var(--muted)" font-family="var(--font)">${scores[0]}/${b.scoreMax}</text>
    <text x="${W-PAD}" y="${H}" font-size="10" fill="var(--muted)" font-family="var(--font)" text-anchor="end">${scores[scores.length-1]}/${b.scoreMax}</text>
  </svg>`;
}

window.switchProfile = function(id){

window.addProfile = function(){
  const name = document.getElementById('new-name').value.trim();
  if(!name){ toast('Enter a name'); return; }
  const profiles = DB.getProfiles();
  const id = uid();
  profiles.push({id,name,createdAt:new Date().toISOString()});
  DB.saveProfiles(profiles); DB.setActive(id);
  toast('Profile created');
  go('home');
};
window.delProfile = function(){
  if(!confirm('Delete this profile and all its data? This cannot be undone.')) return;
  const pid = DB.getActive();
  DB.saveProfiles(DB.getProfiles().filter(p=>p.id!==pid));
  // Remove every key belonging to this profile (et_{pid}_*), so nothing is orphaned
  // if new per-profile keys are added later.
  const prefix = 'et_' + pid + '_';
  const toRemove = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith(prefix)) toRemove.push(k);
  }
  toRemove.forEach(k => localStorage.removeItem(k));
  DB.setActive(DB.getProfiles()[0]?.id || null);
  go('profiles');
};

// ── Export ───────────────────────────────────────────────
window.exportData = function(){
  const data = {};
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith('et_')) data[k] = localStorage.getItem(k);
  }
  if(!Object.keys(data).length){ toast('Nothing to export yet'); return; }
  const payload = JSON.stringify({ version:1, exportedAt:new Date().toISOString(), data }, null, 2);
  const blob    = new Blob([payload], { type:'application/json' });
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href        = url;
  a.download    = 'effective_teacher_backup_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
};

// ── Import ───────────────────────────────────────────────
window.triggerImport = function(){
  document.getElementById('import-file').click();
};

window.handleImport = function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try {
      const backup = JSON.parse(ev.target.result);
      if(!backup.version || !backup.data || typeof backup.data !== 'object')
        throw new Error('Invalid file');

      // Validate the profiles payload before trusting it
      let backupProfiles;
      try {
        backupProfiles = JSON.parse(backup.data['et_profiles'] || '[]');
      } catch(_){
        throw new Error('Corrupt profiles');
      }
      const validProfiles = Array.isArray(backupProfiles)
        && backupProfiles.every(p => p && typeof p === 'object' && typeof p.id === 'string' && typeof p.name === 'string');
      if(!validProfiles) throw new Error('Corrupt profiles');
      if(!backupProfiles.length){ toast('No profiles found in backup'); e.target.value=''; return; }

      const names = backupProfiles.map(p=>p.name).join(', ');

      // Default action is the SAFE one (add). Replace is a separate, explicit step.
      const addThem = confirm(
        'Found ' + backupProfiles.length + ' profile(s): ' + names + '\n\n' +
        'Tap OK to ADD these alongside your existing data.\n' +
        'Tap Cancel to leave your data unchanged.'
      );

      if(addThem){
        mergeImport(backup.data, backupProfiles);
      } else {
        // Only after declining the safe path do we offer the destructive one,
        // with its own explicit, clearly-worded confirmation.
        const replaceAll = confirm(
          'Nothing added.\n\n' +
          'If instead you want to REPLACE everything currently in the app with this backup, tap OK.\n' +
          'This permanently deletes all current profiles and logs and cannot be undone.\n\n' +
          'Tap Cancel to do nothing.'
        );
        if(replaceAll) replaceImport(backup.data);
      }

    } catch(err){
      alert('Could not read the backup file. Make sure it was exported from this app and has not been edited.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
};

function mergeImport(data, backupProfiles){
  const existing = DB.getProfiles();
  const idMap    = {};

  // Assign each backup profile a fresh ID to avoid collisions
  backupProfiles.forEach(p => {
    const newId  = uid();
    idMap[p.id]  = newId;
    const name   = existing.find(x=>x.name===p.name) ? p.name + ' (backup)' : p.name;
    existing.push({ ...p, id:newId, name });
  });
  DB.saveProfiles(existing);

  // Remap and restore data keys
  Object.keys(data).forEach(k => {
    if(k === 'et_profiles' || k === 'et_active') return;
    Object.keys(idMap).forEach(oldId => {
      if(k.startsWith('et_' + oldId + '_')){
        const newKey = 'et_' + idMap[oldId] + '_' + k.slice(('et_' + oldId + '_').length);
        localStorage.setItem(newKey, data[k]);
      }
    });
  });

  toast('Profiles added from backup');
  renderProfiles();
}

function replaceImport(data){
  // Remove all existing et_ keys
  const toRemove = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith('et_')) toRemove.push(k);
  }
  toRemove.forEach(k => localStorage.removeItem(k));

  // Restore from backup
  Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));

  toast('Data restored from backup');
  go('profiles');
  renderHome();
}

window.saveWeek0 = function(){
  const pid = DB.getActive(); if(!pid) return;
  const scores = {};
  W0_AREAS.forEach((_,i)=>{ scores[i] = parseInt(document.getElementById('w0v-'+i).textContent) || 1; });

  if(!ok){ alert('Could not save the audit: your device storage may be full or restricted.'); return; }
  toast('Audit saved');
  go('home');
};

//  OFFLINE DETECTION + SERVICE WORKER

function setOfflineBanner(offline){
  const banner = document.getElementById('offline-banner');
  // Only claim we're "running from cache" if a service worker actually controls
  // the page. Otherwise be honest: there's no connection and the app may not work.
  const cached = 'serviceWorker' in navigator && !!navigator.serviceWorker.controller;
  banner.textContent = cached
    ? 'No internet connection: running from cache'
    : 'No internet connection';
  banner.classList.toggle('show', offline);
  document.body.classList.toggle('offline', offline);
}
window.addEventListener('online',  () => setOfflineBanner(false));
window.addEventListener('offline', () => setOfflineBanner(true));
if(!navigator.onLine) setOfflineBanner(true);

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        reg.addEventListener('updatefound', () => {
          const sw = reg.installing;
          sw.addEventListener('statechange', () => {
            if(sw.state === 'installed' && navigator.serviceWorker.controller){
              toast('App updated. Reload to get the latest version.');
            }
          });
        });
      })
      .catch(() => {}); // Fail silently — app still works online without SW
  });
}
