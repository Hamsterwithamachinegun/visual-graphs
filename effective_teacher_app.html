<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Effective Teacher">
<meta name="theme-color" content="#FAFAF9">
<title>Effective Teacher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
/* ── Reset + Root ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAFAF9;
  --surface:#FFFFFF;
  --border:#EBEBEA;
  --text:#1A1A1A;
  --muted:#888884;
  --accent:#2563EB;
  --accent-bg:#EFF6FF;
  --nav-h:68px;
  --radius:14px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
/* ── Layout ────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
#views{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 8px);scroll-behavior:smooth}
.view{display:none;padding:20px 16px 8px}
.view.active{display:block}
/* ── Bottom Nav ────────────────────────────────────────── */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:var(--nav-h);
  background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px)
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);border:none;background:none;font-size:10px;font-weight:600;font-family:var(--font);letter-spacing:.03em;transition:color .15s;padding-top:8px}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:transform .15s}
.nav-btn.active svg{transform:scale(1.08)}
/* ── Cards ─────────────────────────────────────────────── */
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-tap{cursor:pointer;transition:transform .1s,box-shadow .1s}
.card-tap:active{transform:scale(.985);box-shadow:none}
/* ── Typography ─────────────────────────────────────────── */
.page-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:20px}
.section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
/* ── Buttons ────────────────────────────────────────────── */
.btn{width:100%;padding:14px;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .1s,transform .1s;font-family:var(--font);letter-spacing:-.01em}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--border);color:var(--text)}
.btn-danger{background:#DC2626;color:#fff}
.btn-link{background:none;border:none;color:var(--accent);font-weight:700;font-family:var(--font);font-size:14px;cursor:pointer;padding:0}
/* ── Form ───────────────────────────────────────────────── */
.field{margin-bottom:18px}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.05em;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:72px;resize:vertical;line-height:1.5}
/* ── Radio options ──────────────────────────────────────── */
.radio-group{display:flex;flex-direction:column;gap:7px}
.radio-opt{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s,background .15s}
.radio-opt.selected{border-color:var(--accent);background:var(--accent-bg)}
.rdot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.radio-opt.selected .rdot{border-color:var(--accent);background:var(--accent)}
.radio-opt.selected .rdot::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;display:block}
.radio-opt span{font-size:14px;line-height:1.4}
/* ── Range ──────────────────────────────────────────────── */
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:var(--border);outline:none;padding:0;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(37,99,235,.3)}
.range-hints{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px}
.range-val{text-align:center;font-size:28px;font-weight:800;color:var(--accent);margin-top:4px;letter-spacing:-.03em}
/* ── Stepper ─────────────────────────────────────────────── */
.stepper{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1.5px solid var(--border);border-radius:13px;padding:5px;margin-top:4px}
.step-btn{width:48px;height:48px;border:none;border-radius:10px;background:var(--surface);font-size:26px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:var(--font);box-shadow:0 1px 3px rgba(0,0,0,.08);transition:background .1s;line-height:1;padding-bottom:2px}
.step-btn:active{background:var(--border)}
.step-display{font-size:32px;font-weight:800;color:var(--accent);letter-spacing:-.03em;min-width:48px;text-align:center}
/* ── Progress bar ───────────────────────────────────────── */
.pbar-wrap{background:#F0F0EE;border-radius:99px;height:5px;overflow:hidden;margin-top:8px}
.pbar{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.16,1,.3,1)}
/* ── Tabs ───────────────────────────────────────────────── */
.tabs{display:flex;background:var(--bg);border-radius:11px;padding:3px;margin-bottom:18px;border:1px solid var(--border)}
.tab{flex:1;padding:8px 6px;text-align:center;font-size:13px;font-weight:700;border-radius:9px;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:none;font-family:var(--font);letter-spacing:-.01em}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
/* ── Log entries ────────────────────────────────────────── */
.log-entry{padding:13px;border-radius:11px;margin-bottom:8px;border:1px solid var(--border);background:var(--surface)}
.log-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.log-date{font-size:12px;color:var(--muted);font-weight:500}
/* ── Empty states ───────────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px;line-height:1}
.empty p{font-size:15px;line-height:1.6}
/* ── Block badge / number ───────────────────────────────── */
.block-num{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;flex-shrink:0}
.block-num-lg{width:48px;height:48px;border-radius:13px;font-size:20px}
/* ── Week 0 area row ────────────────────────────────────── */
.area-row{background:var(--surface);border-radius:var(--radius);padding:15px;margin-bottom:10px;box-shadow:var(--shadow)}
.area-name{font-size:14px;font-weight:600;margin-bottom:12px}
/* ── Info boxes ─────────────────────────────────────────── */
.info-card{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:12px}
.info-card h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.info-card p{font-size:14px;line-height:1.65;color:#333}
.accent-strip{border-left:3px solid var(--accent);padding-left:12px;margin-bottom:12px}
.accent-strip p{font-size:14px;line-height:1.65;color:#333}
/* ── Profile ────────────────────────────────────────────── */
.profile-item{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s}
.profile-item.active-p{border-color:var(--accent);background:var(--accent-bg)}
/* ── Chart ──────────────────────────────────────────────── */
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.chart-label{font-size:12px;flex:1;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-right{display:flex;align-items:center;gap:7px;width:120px;flex-shrink:0}
.chart-bar-bg{flex:1;background:#F0F0EE;border-radius:99px;height:8px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.16,1,.3,1)}
.chart-val{font-size:12px;font-weight:700;width:24px;text-align:right}
/* ── Back btn ───────────────────────────────────────────── */
.back-btn{display:flex;align-items:center;gap:5px;color:var(--accent);font-weight:700;font-size:14px;cursor:pointer;border:none;background:none;font-family:var(--font);padding:0;margin-bottom:18px}
/* ── Score chip ─────────────────────────────────────────── */
.score-chip{font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px}
/* ── Offline banner ─────────────────────────────────────── */
#offline-banner{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1A1A1A;color:#fff;text-align:center;font-size:13px;font-weight:600;font-family:var(--font);padding:8px 16px;z-index:300;letter-spacing:.01em}
#offline-banner.show{display:block}
body.offline #views{padding-top:36px}
#toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;font-family:var(--font);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="offline-banner">No internet connection — running from cache</div>
<div id="app">
    <div id="views">
    <div class="view active" id="view-home"><div id="home-content"></div></div>
    <div class="view" id="view-blocks"><div id="blocks-content"></div></div>
    <div class="view" id="view-block-detail"><div id="block-detail-content"></div></div>
    <div class="view" id="view-progress"><div id="progress-content"></div></div>
    <div class="view" id="view-profiles"><div id="profiles-content"></div></div>
    <div class="view" id="view-week0"><div id="week0-content"></div></div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" data-view="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
    </button>
    <button class="nav-btn" data-view="blocks">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Blocks
    </button>
    <button class="nav-btn" data-view="progress">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progress
    </button>
    <button class="nav-btn" data-view="profiles">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Profiles
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════════
const DB = {
  getProfiles(){ return JSON.parse(localStorage.getItem('et_profiles') || '[]') },
  saveProfiles(p){ localStorage.setItem('et_profiles', JSON.stringify(p)) },
  getActive(){ return localStorage.getItem('et_active') || null },
  setActive(id){ localStorage.setItem('et_active', id) },
  getWeek0(pid){ return JSON.parse(localStorage.getItem('et_'+pid+'_w0') || 'null') },
  saveWeek0(pid,d){ localStorage.setItem('et_'+pid+'_w0', JSON.stringify(d)) },
  getLogs(pid,b){ return JSON.parse(localStorage.getItem('et_'+pid+'_b'+b) || '[]') },
  addLog(pid,b,entry){
    const logs = this.getLogs(pid,b);
    logs.push({...entry, id: Date.now(), date: new Date().toISOString()});
    localStorage.setItem('et_'+pid+'_b'+b, JSON.stringify(logs));
  },
  deleteLog(pid,b,id){
    const logs = this.getLogs(pid,b).filter(l => l.id !== id);
    localStorage.setItem('et_'+pid+'_b'+b, JSON.stringify(logs));
  }
};

// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const W0_AREAS = [
  "Natural pause points every 5-10 min",
  "Uses analogies or concrete examples",
  "Calls on non-volunteers",
  "Avoids reading text off slides",
  "Moves away from the front of the room"
];

const BLOCKS = [
  {
    id: 1, title: "Pacing", technique: "The Five-Minute Rule", weeks: "Weeks 1-2",
    color: "#3B82F6", light: "#EFF6FF",
    summary: "Limit teacher talk to 5-10 minutes at a stretch. When the timer goes off, stop and use a short active task such as \"Write down two things you just learned.\"",
    why: "Pacing is structural. Getting regular pause points into your lessons creates the space needed for every other technique. It has zero dependency on content knowledge. You just need a timer. Working memory saturates quickly; the pause lets the brain consolidate before you add more.",
    target: "Score 5 or above out of 6 by end of Week 2.",
    scoreMax: 6,
    fields: [
      { key:"q1", label:"Did the timer go off at least once?",
        opts:["Never set it","Set it, forgot to stop","Stopped when it went off"] },
      { key:"q2", label:"Did students do the active task?",
        opts:["Skipped it","Told them but moved on fast","Waited for actual responses"] },
      { key:"q3", label:"Did I restart teaching after the break?",
        opts:["No, ran out of time","Yes, but felt rushed","Yes, felt natural"] }
    ]
  },
  {
    id: 2, title: "Explanation", technique: "Definitions and Analogies", weeks: "Weeks 3-4",
    color: "#16A34A", light: "#F0FDF4",
    summary: "Start each new concept with a single-sentence Bullet-Proof Definition recited aloud, or a Generative Analogy that borrows something students already know to explain the new idea.",
    why: "Without a precise definition up front, students build their own informal version of a concept, often wrong, and everything taught afterwards attaches to that instead. Analogies give a new concept an immediate home in long-term memory by borrowing structure the student already has. The Curse of Knowledge makes it easy to forget what it is like to encounter a concept for the first time.",
    target: "Score 2 or 3 on all three criteria by end of Week 4.",
    scoreMax: 9,
    fields: [
      { key:"technique", label:"Which technique did you use?", type:"select",
        opts:["Bullet-Proof Definition","Generative Analogy"] },
      { key:"c1", label:"Was it prepared in advance?",
        opts:["Made it up on the spot (0)","Rough idea beforehand (1)","Written into lesson plan (2)"] },
      { key:"c2", label:"Was it single and clear?",
        opts:["Several mixed explanations (0)","One explanation but wordy (1)","One sentence, no waffle (2)"] },
      { key:"c3", label:"Student response",
        opts:["Blank looks or confusion (0)","Some nodding (1)","Visible 'aha' or correct use shortly after (2)"] }
    ]
  },
  {
    id: 3, title: "Questioning", technique: "Cold Calling with Wait Time", weeks: "Weeks 5-6",
    color: "#D97706", light: "#FFFBEB",
    summary: "Pose a question to the whole class, pause 3 seconds in silence, then name a specific student. Write 2-3 cold-call questions with student names into your lesson notes before the lesson.",
    why: "Most classroom questioning relies on volunteers. The same 4-5 students answer most questions. The rest sit behind an unspoken contract: stay quiet and nothing happens. Cold Calling dissolves that contract. When any student may be called at any moment, the whole class cannot afford to switch off. The 3-second wait ensures everyone attempts retrieval before the answer arrives, which strengthens memory more than re-listening would.",
    target: "At least 3 cold calls per lesson. Wait time every time by Week 6.",
    scoreMax: null,
    fields: [
      { key:"count", label:"Cold calls made (number)", type:"number", placeholder:"e.g. 4" },
      { key:"wait", label:"Did you wait 3 seconds before naming?",
        opts:["Always","Sometimes","Rarely"] },
      { key:"planned", label:"Did you use pre-planned questions?",
        opts:["Yes","Partly","No"] }
    ]
  },
  {
    id: 4, title: "Slides and Visuals", technique: "Modality Principle", weeks: "Weeks 7-8",
    color: "#7C3AED", light: "#F5F3FF",
    summary: "Audit one presentation: remove text paragraphs from diagram slides, place labels directly on images, and cut bullets you would read aloud. Then teach from the improved version and use this log to track further fixes.",
    why: "Students cannot read text and listen to speech at the same time. They use the same cognitive channel. Putting your explanation in text while also saying it aloud forces attention to split and nothing is processed well. Diagrams with separate legends do the same. This block is a one-time audit of a presentation you already own, not a daily habit.",
    target: "Reduce problem slides by at least 50%. No slides where you read text aloud during lessons.",
    scoreMax: null,
    isAudit: true,
    fields: [
      { key:"readSlide", label:"Did you read text off a slide?",
        opts:["No","Once","More than once"] },
      { key:"visualsClear", label:"Did visuals seem clearer to students?",
        opts:["Yes","Unsure","No"] },
      { key:"slideToFix", label:"One slide to fix before next lesson", type:"text",
        placeholder:"Describe the slide..." }
    ]
  },
  {
    id: 5, title: "Voice and Presence", technique: "Intentional Mobility", weeks: "Weeks 9-10",
    color: "#DC2626", light: "#FEF2F2",
    summary: "Move among students using a slide remote. Mark one moment in your lesson plan where you will deliberately change position or vary your voice. Record a lesson in Week 10 and compare to your Week 0 recording.",
    why: "Voice and physical presence are the hardest to self-monitor in real time. By this point earlier techniques are becoming automatic, freeing up mental capacity to notice what your body is doing. A remote clicker is the single most useful physical tool: it breaks the dependency on the front of the room. Small changes in pace, volume and pitch at key moments are clearly perceptible to students even when they feel subtle to you.",
    target: "Score 3 or above on all three dimensions by end of Week 10.",
    scoreMax: 15,
    fields: [
      { key:"mobility", label:"Mobility (1-5)", type:"range", min:1, max:5,
        hints:["Never left front","Intentional zones"] },
      { key:"vocal", label:"Vocal variety (1-5)", type:"range", min:1, max:5,
        hints:["Flat monotone","Dynamic and controlled"] },
      { key:"eye", label:"Eye contact (1-5)", type:"range", min:1, max:5,
        hints:["Screen only","Connects with individuals"] }
    ]
  }
];

// ═══════════════════════════════════════════════
//  REFLECTION PROMPTS
// ═══════════════════════════════════════════════
const PROMPTS = {
  1: {
    low: [
      "The timer went off but felt disruptive — what would make the pause feel more natural next time?",
      "Students didn't engage with the active task — was it the task itself, or the transition into it?",
      "You ran out of time to restart — what would you cut next lesson to protect the pause?"
    ],
    high: [
      "The pause worked well — what did students do during it that told you that?",
      "You stopped when the timer went off — how did the room feel different in the second half?",
      "Good rhythm this lesson — could you try a different active task next time to vary it?"
    ]
  },
  2: {
    low: [
      "The analogy or definition didn't quite land — what do your students already know that might work better?",
      "It felt wordy in the moment — can you cut it to one sentence before next lesson?",
      "Students looked blank — was the concept itself unclear, or the way you explained it?"
    ],
    high: [
      "It clicked for most students — what specifically did you say that seemed to do the work?",
      "The definition stuck — did students use the language back at you later in the lesson?",
      "Strong explanation — could the same analogy carry a different concept in a future lesson?"
    ]
  },
  3: {
    low: [
      "Fewer cold calls than planned — what made you hold back? Pace, confidence, or something else?",
      "The wait time felt long — did students visibly think during it, or did eyes drift?",
      "You reverted to volunteers — was there a moment you could have cold called instead?"
    ],
    high: [
      "Good number of calls — did any student surprise you with their answer?",
      "The wait time held — what did you notice in the room during the silence?",
      "Cold calling felt routine — are students anticipating it now, or still caught off guard?"
    ]
  },
  4: {
    low: [
      "You read from a slide — which one, and what would you put there instead?",
      "The text pulled you in — was it a safety net or a habit? Name the slide to fix.",
      "It happened again — is there one slide that keeps trapping you? Note it here."
    ],
    high: [
      "Clean session — did the visuals do the work, or did your explanation carry it?",
      "No reading from slides — which visual landed best and why?",
      "Good discipline — is there a slide that still tempts you? Note it before next lesson."
    ]
  },
  5: {
    low: [
      "You stayed near the front — was it habit, or was something pulling you back there?",
      "The voice stayed flat in places — where in the lesson would a pause or pitch drop have helped?",
      "Low mobility this session — pick one specific moment next lesson where you will deliberately move."
    ],
    high: [
      "Good presence — did moving change the dynamic with any specific students?",
      "Strong vocal variety — was it intentional or did it happen naturally? Note what triggered it.",
      "You moved well — did students track you, or did some disengage when you left the front?"
    ]
  }
};
const S = {
  view: 'home',
  block: null,
  blockTab: 'info',
  form: {}
};

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function uid(){ return Math.random().toString(36).slice(2,9) }
function fmtDate(iso){
  return new Date(iso).toLocaleDateString('sv-SE',{month:'short',day:'numeric'});
}

function getPrompt(blockId, logCount, formVals){
  const bank  = PROMPTS[blockId];
  const index = logCount % 3;
  // Determine low/high based on block
  let isHigh = false;
  if(blockId === 1){
    const total = (formVals.q1||0)+(formVals.q2||0)+(formVals.q3||0);
    const filled = formVals.q1!==undefined && formVals.q2!==undefined && formVals.q3!==undefined;
    isHigh = filled && total >= 4;
  } else if(blockId === 2){
    const extract = v => { if(!v) return 0; const n=v.toString().match(/\((\d+)\)/); return n?parseInt(n[1]):0; };
    const total = extract(formVals.c1)+extract(formVals.c2)+extract(formVals.c3);
    const filled = formVals.c1!==undefined && formVals.c2!==undefined && formVals.c3!==undefined;
    isHigh = filled && total >= 6;
  } else if(blockId === 3){
    isHigh = (formVals.count||0) >= 3;
  } else if(blockId === 4){
    isHigh = formVals.readSlide === 'No';
  } else if(blockId === 5){
    const total = (parseInt(formVals.mobility)||0)+(parseInt(formVals.vocal)||0)+(parseInt(formVals.eye)||0);
    isHigh = total >= 9;
  }
  return (isHigh ? bank.high : bank.low)[index];
}

function refreshPrompt(){
  const el = document.getElementById('notes-prompt');
  if(!el) return;
  const pid  = DB.getActive(); if(!pid) return;
  const logs = DB.getLogs(pid, S.block);
  el.textContent = '💭 ' + getPrompt(S.block, logs.length, S.form);
}
function calcScore(b, vals){
  if(b.id===1) return (vals.q1||0)+(vals.q2||0)+(vals.q3||0);
  if(b.id===2){
    const extract = v => {
      if(v===undefined||v===null) return 0;
      const n = v.toString().match(/\((\d+)\)/);
      return n ? parseInt(n[1]) : 0;
    };
    return extract(vals.c1)+extract(vals.c2)+extract(vals.c3);
  }
  if(b.id===5) return (parseInt(vals.mobility)||0)+(parseInt(vals.vocal)||0)+(parseInt(vals.eye)||0);
  return null;
}
function scorePct(b, score){ return b.scoreMax ? Math.round((score/b.scoreMax)*100) : null }

window.stepVal = function(key, min, max, delta){
  const el  = document.getElementById('sv-'+key);
  const cur = parseInt(el.textContent) || min;
  const next = Math.min(max, Math.max(min, cur + delta));
  el.textContent = next;
  S.form[key] = next;
  refreshPrompt();
};

window.stepW0 = function(i, min, max, delta){
  const el  = document.getElementById('w0v-'+i);
  const cur = parseInt(el.textContent) || min;
  const next = Math.min(max, Math.max(min, cur + delta));
  el.textContent = next;
};

function getTrend(scores){
  if(scores.length < 2) return null;
  const last = scores[scores.length-1];
  const prev = scores[scores.length-2];
  if(last > prev) return 'up';
  if(last < prev) return 'down';
  return 'flat';
}

// W0 area index maps directly to block id (area 0 = block 1, etc.)
function getRecommended(pid){
  const w0 = DB.getWeek0(pid);
  if(!w0) return [];
  return [0,1,2,3,4]
    .map(i => ({ blockId: i+1, score: w0.scores[i]||0 }))
    .filter(x => x.score < 6)          // only recommend areas not already strong
    .sort((a,b) => a.score - b.score)
    .slice(0,2)
    .map(x => x.blockId);
}

// A block unlocks if:
//   - it is Block 1 (always open), or
//   - the previous block has 3+ lessons logged, or
//   - the Week 0 score for the previous block's area was already 6+
//     (teacher already demonstrates that skill — no need to practise it first)
function isUnlocked(blockId, pid){
  if(!pid || blockId === 1) return true;
  if(DB.getLogs(pid, blockId - 1).length >= 3) return true;
  const w0 = DB.getWeek0(pid);
  if(w0 && (w0.scores[blockId - 2] || 0) >= 6) return true;
  return false;
}
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}
function scrollTop(){ document.getElementById('views').scrollTo({top:0,behavior:'smooth'}) }

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function go(view, opts={}){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===view);
  });
  S.view = view;
  if(opts.block !== undefined){ S.block = opts.block; S.blockTab = 'info'; }
  scrollTop();
  render(view);
}

function render(view){
  if(view==='home') renderHome();
  else if(view==='blocks') renderBlocks();
  else if(view==='block-detail') renderBlockDetail();
  else if(view==='progress') renderProgress();
  else if(view==='profiles') renderProfiles();
  else if(view==='week0') renderWeek0();
}

function buildField(f,b){
  if(f.type==='range'){
    const def = Math.round((f.min+f.max)/2);
    return `<div class="field">
      <label class="field-label">${f.label}</label>
      <div class="stepper">
        <button class="step-btn" onclick="stepVal('${f.key}',${f.min},${f.max},-1)">&#8722;</button>
        <div class="step-display" id="sv-${f.key}">${def}</div>
        <button class="step-btn" onclick="stepVal('${f.key}',${f.min},${f.max},1)">&#43;</button>
      </div>
      <div class="range-hints" style="margin-top:8px"><span>${f.hints[0]}</span><span>${f.hints[1]}</span></div>
    </div>`;
  }
  if(f.type==='select'){
    return `<div class="field">
      <label class="field-label">${f.label}</label>
      <select id="f-${f.key}" onchange="S.form['${f.key}']=this.value;refreshPrompt()">
        ${f.opts.map(o=>`<option value="${o}">${o}</option>`).join('')}
      </select>
    </div>`;
  }
  if(f.type==='number'){
    return `<div class="field">
      <label class="field-label">${f.label}</label>
      <input type="number" id="f-${f.key}" min="0" max="30" placeholder="${f.placeholder||''}" oninput="S.form['${f.key}']=parseInt(this.value)||0;refreshPrompt()">
    </div>`;
  }
  if(f.type==='text'){
    return `<div class="field">
      <label class="field-label">${f.label}</label>
      <input type="text" id="f-${f.key}" placeholder="${f.placeholder||''}" oninput="S.form['${f.key}']=this.value">
    </div>`;
  }
  // radio (default)
  return `<div class="field">
    <label class="field-label">${f.label}</label>
    <div class="radio-group" id="rg-${f.key}">
      ${f.opts.map((o,i)=>`
        <div class="radio-opt" onclick="pickRadio('${f.key}',${i},this.closest('.radio-group'))">
          <div class="rdot"></div><span>${o}</span>
        </div>`).join('')}
    </div>
  </div>`;
}
window.pickRadio = function(key,val,group){
  S.form[key]=val;
  group.querySelectorAll('.radio-opt').forEach((o,i)=>o.classList.toggle('selected',i===val));

};

function logSummary(b,l){
  let lines = [];
  if(b.id===3){
    lines.push(`${l.count||0} cold calls &middot; Wait time: ${l.wait||'?'} &middot; Pre-planned: ${l.planned||'?'}`);
  } else if(b.id===4){
    lines.push(`Read from slide: ${l.readSlide||'?'} &middot; Visuals clearer: ${l.visualsClear||'?'}`);
    if(l.slideToFix) lines.push(`Fix: ${l.slideToFix}`);
  } else if(b.id===5){
    lines.push(`Mobility: ${l.mobility||0}/5 &middot; Vocal: ${l.vocal||0}/5 &middot; Eye contact: ${l.eye||0}/5`);
  } else if(b.id===2 && l.technique){
    lines.push(`Technique: ${l.technique}`);
  }
  return lines.map(ln=>`<div style="font-size:13px;color:#444;line-height:1.5">${ln}</div>`).join('');
}

function lineChart(scores,b){
  if(scores.length < 2) return `<div style="font-size:14px;color:var(--muted)">Log at least 2 lessons to see the trend.</div>`;
  const W=300,H=80,PAD=20;
  const pts = scores.map((s,i)=>[
    PAD+(i/(scores.length-1))*(W-PAD*2),
    H-PAD-(s/b.scoreMax)*(H-PAD*2)
  ]);
  const poly = pts.map(p=>p.join(',')).join(' ');
  const dots = pts.map(([x,y],i)=>
    `<circle cx="${x}" cy="${y}" r="4.5" fill="${b.color}" stroke="#fff" stroke-width="1.5"><title>Lesson ${i+1}: ${scores[i]}/${b.scoreMax}</title></circle>`
  ).join('');
  const target = b.scoreMax ? H-PAD-(5/b.scoreMax)*(H-PAD*2) : null; // rough target line
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">
    <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="var(--border)" stroke-width="1"/>
    <polyline points="${poly}" fill="none" stroke="${b.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${PAD}" y="${H}" font-size="10" fill="var(--muted)" font-family="var(--font)">${scores[0]}/${b.scoreMax}</text>
    <text x="${W-PAD}" y="${H}" font-size="10" fill="var(--muted)" font-family="var(--font)" text-anchor="end">${scores[scores.length-1]}/${b.scoreMax}</text>
  </svg>`;
}

window.exportData = function(){
  const data = {};
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith('et_')) data[k] = localStorage.getItem(k);
  }
  if(!Object.keys(data).length){ toast('Nothing to export yet'); return; }
  const payload = JSON.stringify({ version:1, exportedAt:new Date().toISOString(), data }, null, 2);
  const blob    = new Blob([payload], { type:'application/json' });
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href        = url;
  a.download    = 'effective_teacher_backup_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
};

// ── Import ───────────────────────────────────────────────
window.triggerImport = function(){
  document.getElementById('import-file').click();
};

window.handleImport = function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try {
      const backup = JSON.parse(ev.target.result);
      if(!backup.version || !backup.data) throw new Error('Invalid file');

      // Count profiles in backup
      const backupProfiles = JSON.parse(backup.data['et_profiles'] || '[]');
      if(!backupProfiles.length){ toast('No profiles found in backup'); return; }

      const names = backupProfiles.map(p=>p.name).join(', ');
      const choice = confirm(
        'Found ' + backupProfiles.length + ' profile(s): ' + names + '\n\n' +
        'Tap OK to ADD these to your existing data.\n' +
        'Tap Cancel to REPLACE everything with the backup.'
      );

      if(choice) mergeImport(backup.data, backupProfiles);
      else       replaceImport(backup.data);

    } catch(err){
      alert('Could not read the backup file. Make sure it was exported from this app.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
};

function mergeImport(data, backupProfiles){
  const existing = DB.getProfiles();
  const idMap    = {};

  // Assign each backup profile a fresh ID to avoid collisions
  backupProfiles.forEach(p => {
    const newId  = uid();
    idMap[p.id]  = newId;
    const name   = existing.find(x=>x.name===p.name) ? p.name + ' (backup)' : p.name;
    existing.push({ ...p, id:newId, name });
  });
  DB.saveProfiles(existing);

  // Remap and restore data keys
  Object.keys(data).forEach(k => {
    if(k === 'et_profiles' || k === 'et_active') return;
    Object.keys(idMap).forEach(oldId => {
      if(k.startsWith('et_' + oldId + '_')){
        const newKey = 'et_' + idMap[oldId] + '_' + k.slice(('et_' + oldId + '_').length);
        localStorage.setItem(newKey, data[k]);
      }
    });
  });

  toast('Profiles added from backup');
  renderProfiles();
}

function replaceImport(data){
  // Remove all existing et_ keys
  const toRemove = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith('et_')) toRemove.push(k);
  }
  toRemove.forEach(k => localStorage.removeItem(k));

  // Restore from backup
  Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));

  toast('Data restored from backup');
  go('profiles');
  renderHome();
}

window.generateSummary = async function(){
  const pid = DB.getActive(); if(!pid) return;
  const profile  = DB.getProfiles().find(p=>p.id===pid);
  const w0       = DB.getWeek0(pid);
  const allLogs  = BLOCKS.flatMap(b=>DB.getLogs(pid,b.id));

  if(!w0 && allLogs.length < 2){
    showSummaryModal('nodata'); return;
  }

  // Compile block-level data
  const blockData = BLOCKS.map(b=>{
    const logs    = DB.getLogs(pid,b.id);
    const scored  = b.scoreMax ? logs.map(l=>calcScore(b,l)).filter(s=>s!==null) : [];
    const notes   = logs.map(l=>l.notes).filter(Boolean).slice(-3);
    const counts  = b.id===3 ? logs.map(l=>l.count||0) : [];
    return {
      block: b.id, title: b.title,
      logsCount: logs.length,
      latestScore: scored.length ? scored[scored.length-1] : null,
      scoreMax: b.scoreMax || null,
      trend: getTrend(scored.length ? scored : counts),
      recentNotes: notes,
      coldCallCounts: counts.slice(-4)
    };
  });

  const dates     = allLogs.map(l=>l.date).sort();
  const firstDate = dates[0] ? fmtDate(dates[0]) : null;
  const lastDate  = dates[dates.length-1] ? fmtDate(dates[dates.length-1]) : null;

  const payload = {
    teacherName: profile.name,
    week0Scores: w0 ? W0_AREAS.map((a,i)=>({area:a, score:w0.scores[i]||0})) : null,
    practiceSpan: firstDate ? firstDate + (lastDate!==firstDate?' to '+lastDate:'') : null,
    totalLessonsLogged: allLogs.length,
    blocks: blockData
  };

  showSummaryModal('loading');

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are writing a brief personal progress note for a teacher working through a five-block deliberate practice programme covering: Pacing, Explanation, Questioning, Slides and Visuals, and Voice and Presence.

Write in second person. Sound like a warm, observant mentor who has genuinely read the teacher's notes — not a performance management tool. Be specific: use the actual numbers and quote fragments from notes when they add meaning. Acknowledge that this kind of deliberate practice is genuinely demanding alongside a full teaching timetable.

Structure: 2-3 short paragraphs. First: what they have done and what is working — be specific and honest. Second: the current picture, including any blocks not yet started or gaps, without judgement. Third: one concrete forward-looking observation — something specific to notice or try next, not a generic encouragement.

Under 200 words total. No bullet points. Do not open with a sycophantic line. Do not use the phrase "it is clear that". Do not mention any app or programme by name.`,
        messages: [{
          role: 'user',
          content: 'Here is the teacher\'s progress data:\n\n'
            + JSON.stringify(payload, null, 2)
            + '\n\nWrite the progress note.'
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(c=>c.type==='text')?.text || 'Could not generate summary.';
    showSummaryModal('done', profile.name, text);
  } catch(err){
    showSummaryModal('error');
  }
};

  const old = document.getElementById('summary-modal');

  const modal = document.createElement('div');
  modal.id = 'summary-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:flex;align-items:flex-end;';

  const inner = state === 'loading' ? `
    <div style="background:var(--surface);border-radius:20px 20px 0 0;padding:36px 20px;width:100%;max-width:480px;margin:0 auto;text-align:center">
      <div style="font-size:28px;margin-bottom:14px">✨</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:6px">Reading your logs...</div>
      <div style="font-size:14px;color:var(--muted)">This takes a few seconds</div>
    </div>`

  : state === 'done' ? `
    <div style="background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;margin:0 auto;max-height:82vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
        <div>
          <div style="font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Progress summary</div>
          <div style="font-weight:800;font-size:19px;letter-spacing:-.02em">${name}</div>
        </div>
        <button onclick="closeSummaryModal()" style="border:none;background:var(--bg);border-radius:99px;width:34px;height:34px;font-size:15px;cursor:pointer;color:var(--muted);font-family:var(--font);flex-shrink:0;margin-left:12px">&#10005;</button>
      </div>
      <div id="summary-text" style="font-size:15px;line-height:1.75;color:var(--text);white-space:pre-wrap;margin-bottom:22px">${text}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1" onclick="copySummary()">Copy text</button>
        <button class="btn btn-ghost" style="flex:1" onclick="closeSummaryModal()">Close</button>
      </div>
    </div>`

  : state === 'nodata' ? `
    <div style="background:var(--surface);border-radius:20px 20px 0 0;padding:36px 20px;width:100%;max-width:480px;margin:0 auto;text-align:center">
      <div style="font-size:28px;margin-bottom:14px">📋</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">Not enough data yet</div>
      <div style="font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px">Complete the Week 0 audit and log at least a couple of lessons first — otherwise there is nothing meaningful to summarise.</div>
      <button class="btn btn-ghost" onclick="closeSummaryModal()">Close</button>
    </div>`

  : `
    <div style="background:var(--surface);border-radius:20px 20px 0 0;padding:36px 20px;width:100%;max-width:480px;margin:0 auto;text-align:center">
      <div style="font-size:28px;margin-bottom:14px">⚠️</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">Could not generate summary</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:20px">Check your internet connection and try again.</div>
      <button class="btn btn-ghost" onclick="closeSummaryModal()">Close</button>
    </div>`;

  modal.innerHTML = inner;
  modal.addEventListener('click', e=>{ if(e.target===modal) closeSummaryModal(); });
  document.body.appendChild(modal);
}

window.closeSummaryModal = function(){
  const m = document.getElementById('summary-modal');
  if(m) m.remove();
};

window.copySummary = function(){
  const text = document.getElementById('summary-text')?.textContent || '';
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard')).catch(fallbackCopy.bind(null,text));
  } else { fallbackCopy(text); }
};

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  toast('Copied to clipboard');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
document.querySelectorAll('.nav-btn[data-view]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const v = btn.dataset.view;
    if(v===S.view && v!=='block-detail') return;
    go(v);
  });
});

// Register PWA manifest dynamically
const manifest = {name:"Effective Teacher",short_name:"ETeacher",start_url:"./",display:"standalone",background_color:"#FAFAF9",theme_color:"#FAFAF9",icons:[{src:"https://placehold.co/192x192/2563EB/ffffff?text=ET",sizes:"192x192",type:"image/png"}]};
const mlink = document.createElement('link');
mlink.rel='manifest';
mlink.href='data:application/json,'+encodeURIComponent(JSON.stringify(manifest));
document.head.appendChild(mlink);

// ═══════════════════════════════════════════════
//  OFFLINE DETECTION + SERVICE WORKER
// ═══════════════════════════════════════════════
function setOfflineBanner(offline){
  document.getElementById('offline-banner').classList.toggle('show', offline);
  document.body.classList.toggle('offline', offline);
}
window.addEventListener('online',  () => setOfflineBanner(false));
window.addEventListener('offline', () => setOfflineBanner(true));
if(!navigator.onLine) setOfflineBanner(true);

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        reg.addEventListener('updatefound', () => {
          const sw = reg.installing;
          sw.addEventListener('statechange', () => {
            if(sw.state === 'installed' && navigator.serviceWorker.controller){
              toast('App updated. Reload to get the latest version.');
            }
          });
        });
      })
      .catch(() => {}); // Fail silently — app still works online without SW
  });
}

renderHome();
</script>
</body>
</html>
