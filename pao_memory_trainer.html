<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAO Digit Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #f5f3ef;
      --bg-card:     #eceae4;
      --text:        #1a1814;
      --text-muted:  #7a7568;
      --border:      #ccc9c0;
      --border-soft: #dedad2;
      --accent:      #1a1814;

      --green-bg:    #eaf5ec;
      --green-border:#a8d5ae;
      --green-text:  #1e6b30;
      --red-bg:      #fbeaea;
      --red-border:  #e0a8a8;
      --red-text:    #7a1e1e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem 5rem;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .app-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .app-heading {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 2.5rem;
    }

    /* ── Phases ── */
    .phase { display: none; }
    .phase.active {
      display: block;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── Config grid ── */
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
      margin-bottom: 1.75rem;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 9px;
    }

    input[type="range"] {
      display: block;
      width: 100%;
      margin-bottom: 9px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    input[type="number"] {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      width: 100%;
      padding: 8px 10px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: var(--accent); }
    input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }

    /* ── Buttons ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 15px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: var(--bg);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover  { opacity: 0.85; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      display: block;
      width: 100%;
      padding: 13px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: background 0.15s, transform 0.1s;
    }
    .btn-ghost:hover  { background: var(--bg-card); }
    .btn-ghost:active { transform: scale(0.98); }

    /* ── Study phase ── */
    .phase-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .digits-display {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 24px;
      justify-content: center;
      margin: 1.5rem 0 2.5rem;
    }

    .chunk {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }

    .countdown-wrap {
      background: var(--bg-card);
      border-radius: 999px;
      height: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .countdown-bar {
      height: 100%;
      background: var(--accent);
      width: 100%;
      transform-origin: left;
    }
    .countdown-label {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
    }

    /* ── Recall phase ── */
    .recall-heading {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .recall-hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .recall-input {
      font-family: 'Space Mono', monospace;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.1em;
      width: 100%;
      text-align: center;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-card);
      color: var(--text);
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .recall-input:focus { border-color: var(--accent); }

    /* ── Feedback phase ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--bg-card);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      border: 1px solid var(--border-soft);
    }
    .stat-num {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      display: block;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .feedback-card {
      border-radius: 12px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border-soft);
    }
    .feedback-card.correct {
      background: var(--green-bg);
      border-color: var(--green-border);
    }
    .feedback-card.wrong {
      background: var(--red-bg);
      border-color: var(--red-border);
    }

    .feedback-verdict {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .feedback-card.correct .feedback-verdict { color: var(--green-text); }
    .feedback-card.wrong  .feedback-verdict { color: var(--red-text);   }

    .comparison { display: flex; flex-direction: column; gap: 12px; }
    .comp-row   { display: flex; flex-direction: column; gap: 4px; }
    .comp-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .comp-digits {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.06em;
      word-break: break-all;
      line-height: 1.7;
    }
    .d-ok  { color: var(--green-text); }
    .d-err { color: var(--red-text);   }

    .score-line {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 1rem;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      body { padding: 2rem 1rem 4rem; }

      .app-heading { font-size: 30px; margin-bottom: 1.75rem; }

      /* Stack config to 1 column on small phones */
      .config-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      /* Larger touch targets for range inputs */
      input[type="range"] {
        height: 28px;
        margin-bottom: 10px;
      }

      /* Bigger number boxes for fat fingers */
      input[type="number"] {
        font-size: 16px; /* prevents iOS zoom on focus */
        padding: 11px 10px;
      }

      /* Digits scale down gracefully */
      .chunk { font-size: clamp(20px, 7vw, 36px) !important; }
      .digits-display { gap: 14px 18px; }

      /* Recall input: prevent iOS zoom (font-size >= 16px) */
      .recall-input {
        font-size: 22px;
        padding: 14px;
        letter-spacing: 0.06em;
      }

      /* Taller tap targets on buttons */
      .btn-primary { padding: 17px; font-size: 16px; }
      .btn-ghost   { padding: 15px; font-size: 15px; }

      /* Stack action buttons vertically */
      .action-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      /* Feedback digits a bit smaller */
      .comp-digits { font-size: 16px; letter-spacing: 0.04em; }

      /* Stats cards tighter */
      .stat-num   { font-size: 18px; }
      .stat-label { font-size: 9px;  }
    }

    /* Very small phones */
    @media (max-width: 360px) {
      .app-heading { font-size: 26px; }
      .recall-input { font-size: 18px; }
    }
  </style>
</head>
<body>
<div class="app">

  <p class="app-eyebrow">Memory Training</p>
  <h1 class="app-heading">PAO Digit<br>Trainer</h1>

  <!-- CONFIG -->
  <div id="phase-config" class="phase active">
    <div class="config-grid">
      <div>
        <label class="field-label" for="numDigits">Digits</label>
        <input type="range" id="numDigits" min="1" max="100" step="1" value="18"
          oninput="document.getElementById('digitsBox').value = this.value">
        <input type="number" id="digitsBox" min="1" max="9999" value="18"
          oninput="document.getElementById('numDigits').value = Math.min(this.value, 100)">
      </div>
      <div>
        <label class="field-label" for="studyTime">Study time (s)</label>
        <input type="range" id="studyTime" min="1" max="120" step="1" value="30"
          oninput="document.getElementById('timeBox').value = this.value">
        <input type="number" id="timeBox" min="1" max="3600" value="30"
          oninput="document.getElementById('studyTime').value = Math.min(this.value, 120)">
      </div>
      <div>
        <label class="field-label" for="chunkSize">Chunk size</label>
        <input type="range" id="chunkSize" min="1" max="10" step="1" value="6"
          oninput="document.getElementById('chunkBox').value = this.value">
        <input type="number" id="chunkBox" min="1" max="20" value="6"
          oninput="document.getElementById('chunkSize').value = Math.min(Math.max(this.value, 1), 10)">
      </div>
    </div>
    <button class="btn-primary" onclick="startSession()">Start session</button>
  </div>

  <!-- STUDY -->
  <div id="phase-study" class="phase">
    <p class="phase-eyebrow">Memorise these digits</p>
    <div class="digits-display" id="digitsDisplay"></div>
    <div class="countdown-wrap">
      <div class="countdown-bar" id="countdownBar"></div>
    </div>
    <p class="countdown-label" id="countdownLabel"></p>
  </div>

  <!-- RECALL -->
  <div id="phase-recall" class="phase">
    <p class="phase-eyebrow">Recall</p>
    <p class="recall-heading">Enter the digits you memorised</p>
    <p class="recall-hint" id="recallHint"></p>
    <input type="text" class="recall-input" id="recallInput"
      inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false"
      placeholder="···"
      oninput="this.value = this.value.replace(/[^0-9]/g, '')"
      onkeydown="if (event.key === 'Enter') checkAnswer()">
    <button class="btn-ghost" onclick="checkAnswer()">Check answer</button>
  </div>

  <!-- FEEDBACK -->
  <div id="phase-feedback" class="phase">
    <div class="stats-row" id="statsRow"></div>
    <div class="feedback-card" id="feedbackCard">
      <p class="feedback-verdict" id="feedbackVerdict"></p>
      <div class="comparison" id="comparison"></div>
      <p class="score-line" id="scoreLine"></p>
    </div>
    <div class="action-row">
      <button class="btn-primary" onclick="startSession()">New sequence</button>
      <button class="btn-ghost"   onclick="resetToConfig()">Change settings</button>
    </div>
  </div>

</div>

<script>
  let sequence = '';
  let countdownTimer = null;
  let stats = { attempts: 0, perfect: 0, totalDigits: 0, correctDigits: 0 };

  function get(id) { return document.getElementById(id); }

  function getDigits()    { return Math.max(1, parseInt(get('digitsBox').value)  || 18); }
  function getTime()      { return Math.max(1, parseInt(get('timeBox').value)    || 30); }
  function getChunkSize() { return Math.max(1, parseInt(get('chunkBox').value)   || 6);  }

  function showPhase(id) {
    document.querySelectorAll('.phase').forEach(el => el.classList.remove('active'));
    get(id).classList.add('active');
  }

  function generateSequence(n) {
    let s = '';
    for (let i = 0; i < n; i++) s += Math.floor(Math.random() * 10);
    return s;
  }

  function chunkFontSize(size) {
    if (size <= 3)  return '44px';
    if (size <= 6)  return '36px';
    if (size <= 9)  return '28px';
    return '22px';
  }

  function renderChunks(seq) {
    const el = get('digitsDisplay');
    const size = getChunkSize();
    const fs = chunkFontSize(size);
    el.innerHTML = '';
    for (let i = 0; i < seq.length; i += size) {
      const span = document.createElement('span');
      span.className = 'chunk';
      span.style.fontSize = fs;
      span.textContent = seq.slice(i, i + size);
      el.appendChild(span);
    }
  }

  function startSession() {
    if (countdownTimer) clearInterval(countdownTimer);
    const n = getDigits(), t = getTime();
    sequence = generateSequence(n);
    renderChunks(sequence);
    get('recallHint').textContent = `${n} digit${n !== 1 ? 's' : ''} — type without spaces`;
    get('recallInput').value = '';
    showPhase('phase-study');
    startCountdown(t);
  }

  function startCountdown(seconds) {
    const bar   = get('countdownBar');
    const label = get('countdownLabel');
    let remaining = seconds;

    bar.style.transition = 'none';
    bar.style.width = '100%';
    void bar.offsetWidth; // force reflow
    bar.style.transition = `width ${seconds}s linear`;
    bar.style.width = '0%';

    label.textContent = remaining + 's';
    countdownTimer = setInterval(() => {
      remaining--;
      label.textContent = remaining + 's';
      if (remaining <= 0) {
        clearInterval(countdownTimer);
        showPhase('phase-recall');
        get('recallInput').focus();
      }
    }, 1000);
  }

  function checkAnswer() {
    const userInput = get('recallInput').value.trim();
    const correct   = sequence;
    const n         = correct.length;

    stats.attempts++;
    stats.totalDigits += n;

    let correctCount = 0;
    let acHTML = '', auHTML = '';

    for (let i = 0; i < Math.max(correct.length, userInput.length); i++) {
      const c = correct[i]  || '';
      const u = userInput[i] || '_';
      if (c !== '' && c === u) {
        correctCount++;
        acHTML += `<span class="d-ok">${c}</span>`;
        auHTML += `<span class="d-ok">${u}</span>`;
      } else {
        acHTML += `<span class="d-err">${c || '_'}</span>`;
        auHTML += `<span class="d-err">${u}</span>`;
      }
    }

    stats.correctDigits += correctCount;
    const isPerfect = userInput === correct;
    if (isPerfect) stats.perfect++;

    // Feedback card
    const card = get('feedbackCard');
    card.className = 'feedback-card ' + (isPerfect ? 'correct' : 'wrong');
    get('feedbackVerdict').textContent = isPerfect ? '✓ Perfect recall' : '✗ Not quite';

    get('comparison').innerHTML = `
      <div class="comp-row">
        <span class="comp-label">Target</span>
        <span class="comp-digits">${acHTML}</span>
      </div>
      <div class="comp-row">
        <span class="comp-label">Your answer</span>
        <span class="comp-digits">${userInput ? auHTML : '<span style="color:#7a7568">—</span>'}</span>
      </div>`;

    const pct = Math.round((correctCount / n) * 100);
    get('scoreLine').textContent = `${correctCount} of ${n} digits correct (${pct}%)`;

    // Session stats
    const acc = Math.round(stats.correctDigits / stats.totalDigits * 100);
    get('statsRow').innerHTML = `
      <div class="stat-card">
        <span class="stat-num">${stats.attempts}</span>
        <span class="stat-label">Attempts</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">${stats.perfect}</span>
        <span class="stat-label">Perfect</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">${acc}%</span>
        <span class="stat-label">Accuracy</span>
      </div>`;

    showPhase('phase-feedback');
  }

  function resetToConfig() {
    if (countdownTimer) clearInterval(countdownTimer);
    stats = { attempts: 0, perfect: 0, totalDigits: 0, correctDigits: 0 };
    showPhase('phase-config');
  }
</script>
</body>
</html>
